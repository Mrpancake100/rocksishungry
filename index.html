<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>your name</title>
<link rel="icon" type="image/png" href="assets/site%20logo%202.png">
<link rel="apple-touch-icon" href="assets/site%20logo%202.png">
<meta name="description" content="Personal link page">
    <meta name="description" content="Personal link page">
    <link rel="preload" href="assets/background-placeholder.png" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="stage" aria-label="Personal link page">
      <img class="background" id="background" src="assets/background-placeholder.png" alt="">
      <div class="shade" aria-hidden="true"></div>

      <section class="identity" aria-labelledby="site-title">
        <img class="profile" id="profile" src="" alt="">
        <p class="tagline" id="tagline"></p>
        <h1 class="logo" id="site-title"></h1>
        <nav class="socials" id="socials" aria-label="Social links"></nav>
        <div class="contacts" id="contacts" aria-label="Contact handles"></div>
      </section>

      <button class="credits-toggle" id="credits-toggle" type="button" aria-expanded="false" aria-controls="credits-panel">
        Credits
      </button>

      <aside class="credits-panel" id="credits-panel" aria-label="Credits" hidden>
        <button class="credits-close" id="credits-close" type="button" aria-label="Close credits">
          <span aria-hidden="true">x</span>
        </button>
        <h2>Credits</h2>
        <ul id="credits"></ul>
      </aside>
    </main>

    <script src="site.config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
